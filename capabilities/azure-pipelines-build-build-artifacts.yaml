    resources:
    - path: /v1/build/builds/{buildid}/artifacts
      name: build-builds-buildid-artifacts
      description: REST surface for build-builds-buildId-artifacts.
      operations:
      - method: GET
        name: listbuildartifacts
        description: Azure Pipelines List build artifacts
        call: azure-pipelines-build-build-artifacts.listbuildartifacts
        outputParameters:
        - type: object
