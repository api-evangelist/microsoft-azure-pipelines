      outputParameters:
      - type: object
        mapping: $.
    - name: azure-pipelines-get-specific-build
      description: Azure Pipelines Get a specific build artifact
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: azure-pipelines-build-build-artifacts.getbuildartifact
      with:
        artifactName: tools.artifactName
      outputParameters:
      - type: object
        mapping: $.
