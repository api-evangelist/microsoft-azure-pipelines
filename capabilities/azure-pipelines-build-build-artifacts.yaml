    - path: /v1/build/builds/{buildid}/artifacts/{artifactname}
      name: build-builds-buildid-artifacts-artifactname
      description: REST surface for build-builds-buildId-artifacts-artifactName.
      operations:
      - method: GET
        name: getbuildartifact
        description: Azure Pipelines Get a specific build artifact
        call: azure-pipelines-build-build-artifacts.getbuildartifact
        with:
          artifactName: rest.artifactName
        outputParameters:
        - type: object
          mapping: $.
